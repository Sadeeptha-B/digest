<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      The Content-Security-Policy <meta> tag is injected here at PRODUCTION BUILD time from the
      single source in csp.ts (see vite.config.ts). It is intentionally NOT injected by the Vite dev
      server — CSP is a production hardening measure, and enforcing it in dev breaks Vite's own
      inline HMR scripts. Production also gets a stronger real CSP *header* (with frame-ancestors)
      emitted to dist/_headers from that same source. Edit the policy in csp.ts only.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digest — distraction-free playlists</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
